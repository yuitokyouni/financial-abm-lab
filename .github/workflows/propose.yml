name: propose

# LLM-driven ABM proposal generation. Runs on a weekly schedule + manual trigger.
# Cost: $0 (uses Groq free tier via GROQ_API_KEY repo secret).
# Output: a PR with one markdown file per proposal under proposals/.

on:
  schedule:
    # Every Monday at 09:00 UTC (= 18:00 JST). Adjust as needed.
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      n_proposals:
        description: "How many proposals to generate"
        required: false
        default: "5"
      groq_model:
        description: "Groq model id"
        required: false
        default: "llama-3.3-70b-versatile"

# Need to commit + push + open a PR.
permissions:
  contents: write
  pull-requests: write

jobs:
  propose:
    runs-on: ubuntu-latest
    env:
      DB_PATH: data/abm_knowhow.db
      PROPOSALS_DIR: proposals/${{ github.run_id }}
      N_PROPOSALS: ${{ github.event.inputs.n_proposals || '5' }}
      GROQ_MODEL: ${{ github.event.inputs.groq_model || 'llama-3.3-70b-versatile' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync workspace
        run: uv sync

      - name: Rebuild DB from scratch (ABM + synthetic + real refs + methods seed)
        # The runs table is regenerated from code on each Actions invocation so
        # we don't have to commit a binary SQLite file. methods commentary
        # (the actual user state) lives in the `methods` table; for now SEED
        # carries the mechanism descriptions and user notes default to empty
        # in CI. (TODO: an export/import flow to git-track user notes.)
        run: |
          mkdir -p data notebooks/yahoo_cache
          uv run python -m fingerprint_atlas.populate \
            --db "$DB_PATH" --n-per-model 12 --seed-base 1000 --rng-seed 7 --quiet
          uv run python -m fingerprint_atlas.populate_refs \
            --db "$DB_PATH" --n-synthetic-per-model 6 \
            --cache-dir notebooks/yahoo_cache
          uv run python -m fingerprint_atlas.methods_cli --db "$DB_PATH" seed

      - name: Generate proposals via Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "::error::GROQ_API_KEY secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          uv run python -m fingerprint_atlas.propose_cli \
            --db "$DB_PATH" from-corpus \
            --n "$N_PROPOSALS" --groq-model "$GROQ_MODEL"

      - name: Export proposals to markdown
        run: |
          uv run python -m fingerprint_atlas.propose_cli \
            --db "$DB_PATH" dump-md --out "$PROPOSALS_DIR" --status proposed
          ls -la "$PROPOSALS_DIR"

      - name: Open PR with new proposals
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: propose/${{ github.run_id }}
          base: claude/vibrant-ptolemy-fapuxw
          add-paths: |
            proposals/**
          commit-message: "propose: new ABM proposals from ${{ env.GROQ_MODEL }} (run ${{ github.run_id }})"
          title: "Weekly proposals — ${{ github.run_id }}"
          body: |
            Generated by `${{ env.GROQ_MODEL }}` via the propose workflow.

            **How to review**
            - Read each `proposals/${{ github.run_id }}/proposal_NNNN_*.md`.
            - Delete any markdown file for a proposal you want to drop.
            - Merge this PR to record the kept proposals on the branch.
            - To run an approved proposal end-to-end (build → run → fingerprint
              → measure prediction error), use locally:
              ```
              uv run python -m fingerprint_atlas.propose_cli \
                --db ../test/knowhow/abm_knowhow.db execute <id>
              ```
          delete-branch: true

name: CI

on:
  push:
    branches: [main, consolidation]
  pull_request:

# Stage B: uv workspace で packages の正準コアをテストする。
# imported/ の旧 experiment 群は依存未統一のため対象外 (順次 experiments/ へ移行)。
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync workspace
        run: uv sync --extra dev
      - name: Lint (packages + experiments)
        # minor #3: 旧 `|| true` は ruff を無力化して lint が絶対に CI を落とせな
        # かった。ゲートとして機能させるため除去。
        run: uv run ruff check packages experiments src tests
      - name: Test (fast; slow parity excluded)
        run: uv run pytest -m "not slow"
      - name: Structure check
        run: |
          test -d packages/abm_models/abm_models/sg
          test -d packages/stylized_facts/stylized_facts
          for d in speculation-game-info PRISM PROV-ABM-atlas market-dynamics ABM-Microstructure agent-based-modeling; do
            test -d "imported/$d"
          done
          echo "monorepo structure OK"

  # #36: 最優先研究線 YH005/YH006 の自動検証。pams を要し、各 experiment は独自の
  # sys.path / 同名モジュール (configs 等) を持つため、workspace テストとは別ジョブで
  # experiment ごとに個別 invocation する (まとめると collection が衝突する)。
  experiments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync workspace (+ experiments extra = pams)
        run: uv sync --extra dev --extra experiments
      - name: YH005 tests (SG parity / stylized facts)
        working-directory: imported/speculation-game-info/experiments/YH005
        run: uv run --project ${{ github.workspace }} pytest tests/ -q
      - name: YH006 tests (LOB inventory sync / round-trip invariants / wealth)
        working-directory: imported/speculation-game-info/experiments/YH006
        run: uv run --project ${{ github.workspace }} pytest tests/ -q

      - "no_anticipation"
      - "no_spillover"
    unit: "correlation"
    references:
      - "empirical_prism_estimator_v0.2.0"
      - "yfinance_french23_euroctrl16"

  - fact_id: "gain_loss_asymmetry"
    delta_hat: 0.4265

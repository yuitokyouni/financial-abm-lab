# Natural Experiment Record #2: French Financial Transaction Tax (2012)
#
# France introduced a 0.2% tax on purchases of French large-cap stocks
# (market cap > EUR 1B) effective 2012-08-01.  Treatment group was
# determined by market-cap threshold — a sharp regulatory cutoff.
#
# Ground truth deltas RE-DERIVED from raw daily returns using PRISM's
# own fact estimators (v0.2.0) via Difference-in-Differences:
#   Treatment: 23 French CAC 40 large-cap stocks (yfinance)
#   Control:   16 German DAX / Dutch AEX stocks (yfinance)
#   Pre:  2011-08-01 to 2012-07-31 (~256 trading days, 12 months)
#   Post: 2012-08-01 to 2013-07-31 (~251 trading days, 12 months)
#   Bootstrap CI95 with 5000 resamples on stock-level DiD estimates.
#
# RESULTS: 2/6 facts statistically significant at 95% level:
#   leverage_effect:    DiD = -0.071, CI [-0.118, -0.018] — SIGNIFICANT
#   squared_return_acf: DiD = +0.062, CI [+0.011, +0.116] — SIGNIFICANT

ner_id: "french_ftt_2012_eu"

intervention:
  class: "transaction_tax"
  canonical_params:
    rate: 0.002
    unit: "fraction_of_notional"
    applies_to: "buy_side"

venue: "EU_equity_largecap"
date_effective: "2012-08-01"
assignment: "regulatory_cutoff"

ground_truth_delta:
  - fact_id: "volatility_clustering"
    delta_hat: -0.0768
    ci95: [-0.2630, 0.1172]
    causal_method: "did_firm_fe"
    causal_assumptions:
      - "parallel_trends"
      - "no_anticipation"
      - "no_spillover"
    unit: "relative"
    references:
      - "empirical_prism_estimator_v0.2.0"
      - "yfinance_french23_euroctrl16"

  - fact_id: "leverage_effect"
    delta_hat: -0.0707
    ci95: [-0.1179, -0.0178]
    causal_method: "did_firm_fe"
    causal_assumptions:

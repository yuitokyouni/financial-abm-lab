    unit: "excess_kurtosis"
    references:
      - "empirical_prism_estimator_v0.2.0"
      - "yfinance_topix100_40treat_20ctrl_clean"

  - fact_id: "abs_autocorrelation"
    delta_hat: 0.0174
    ci95: [-0.0421, 0.0794]
    causal_method: "did_firm_fe"
    causal_assumptions:
      - "parallel_trends"
      - "no_anticipation"
      - "no_spillover_to_non_topix100"
    unit: "correlation"
    references:
      - "empirical_prism_estimator_v0.2.0"
      - "yfinance_topix100_40treat_20ctrl_clean"

  - fact_id: "squared_return_acf"
    delta_hat: 0.0183
    ci95: [-0.0397, 0.0789]
    causal_method: "did_firm_fe"
    causal_assumptions:
      - "parallel_trends"
      - "no_anticipation"
      - "no_spillover_to_non_topix100"
    unit: "correlation"
    references:
      - "empirical_prism_estimator_v0.2.0"

data_hashes:
  treatment_pre_returns: "yfinance_topix100_40stocks_239d_clean"
  treatment_post_returns: "yfinance_topix100_40stocks_242d_clean"
  control_pre_returns: "yfinance_non_topix100_20stocks_239d_clean"

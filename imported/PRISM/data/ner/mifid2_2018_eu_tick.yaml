# Natural Experiment Record #3: MiFID II Tick Size Regime (2018)
#
# MiFID II (Markets in Financial Instruments Directive II) took effect
# on 2018-01-03 across EU equity markets.  Among many provisions, it
# imposed a harmonized tick size regime based on price level and average
# daily number of transactions (ADNT), effectively increasing tick sizes
# for many liquid large-cap stocks while reducing them for some illiquids.
#
# The treatment is the tick size increase experienced by liquid stocks
# whose previous national tick table was finer than the new MiFID II table.
# EU vs. non-EU comparison provides the identification strategy (DiD).
#
# VALIDITY: INVALID — All delta values are fabricated external_claims.
# Aquilina et al. (2022) measures latency arbitrage/sniping rates.
# Comerton-Forde et al. (2019) measures spreads/depth/market share.
# Neither reports PRISM's return-distribution stylized facts.
# Must be re-derived empirically before use. See docs/CELL_VALIDITY_AUDIT.md.

ner_id: "mifid2_2018_eu_tick"

intervention:
  class: "tick_size_increase"
  canonical_params:
    min_tick_from: 0.005
    min_tick_to: 0.01
    unit: "EUR"
    scope: "liquid_largecap"

venue: "EU_equity_largecap"
date_effective: "2018-01-03"
assignment: "regulatory_cutoff"


# 全 lint を pre-commit で gate する(CLAUDE.md 技術選択)。
# ローカル: `uv run pre-commit install` 後、commit 毎に自動実行。
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        # 第三者依存の重さを避け、自前パッケージのみ型検査する。
        files: ^(provabm|atlas|toy)/
        additional_dependencies:
          - numpy
          - pandas-stubs

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: check-merge-conflict

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "prism-abm"
version = "0.1.0"
description = "Provenance-backed Reproducible Intervention-response Scoring of Mechanisms"
requires-python = ">=3.11"
license = "MIT"
readme = "README.md"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Office/Business :: Financial",
    "Typing :: Typed",
]
keywords = ["agent-based-model", "financial-markets", "stylized-facts", "natural-experiments", "reproducibility"]
dependencies = [
    "numpy>=1.26",
    "pandas>=2.1",
    "scipy>=1.12",
    "pyyaml>=6.0",
    "jsonschema>=4.20",
]

[project.urls]
Repository = "https://github.com/yuitokyouni/PRISM"
Documentation = "https://github.com/yuitokyouni/PRISM/blob/main/docs/getting_started.md"

[project.optional-dependencies]
viz = [
    "matplotlib>=3.8",
]
real-data = [
    "yfinance>=0.2",
]
docs = [
    "pdoc>=14.0",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.1",
    "ruff>=0.3",
    "mypy>=1.8",
    "pdoc>=14.0",
]

[project.scripts]
prism = "prism.cli.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src/prism"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
filterwarnings = [
    "ignore::RuntimeWarning:scipy.optimize",
    "ignore::DeprecationWarning:importlib._bootstrap",
]

[tool.coverage.run]
source = ["prism"]

[tool.coverage.report]
fail_under = 85

[tool.mypy]
python_version = "3.11"
strict = true

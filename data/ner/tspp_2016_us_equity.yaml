# Natural Experiment Record #1: SEC Tick Size Pilot Program (2016-2018)
#
# The SEC mandated wider tick sizes (from $0.01 to $0.05) for ~1200 small-cap
# stocks in a randomized experiment.  Treatment groups were randomly assigned.
#
# VALIDITY: INVALID — All delta values are fabricated external_claims.
# The SEC DERA reports measure spreads/volume/depth, NOT return-distribution
# stylized facts (GARCH persistence, leverage, skewness, kurtosis, ACF).
# Must be re-derived empirically before use. See docs/CELL_VALIDITY_AUDIT.md.

ner_id: "tspp_2016_us_equity"

intervention:
  class: "tick_size_increase"
  canonical_params:
    min_tick_from: 0.01
    min_tick_to: 0.05
    unit: "USD"

venue: "US_equity_smallcap"
date_effective: "2016-10-03"
assignment: "randomized"

ground_truth_delta:
  - fact_id: "volatility_clustering"
    delta_hat: 0.03
    ci95: [-0.01, 0.07]
    causal_method: "did_firm_fe"
    causal_assumptions:
      - "parallel_trends"
      - "no_anticipation"
    unit: "relative"
    references:
      - "SEC DERA, Tick Size Pilot Assessment Reports, 2018"
      - "external_claim"

  - fact_id: "leverage_effect"
    delta_hat: -0.02

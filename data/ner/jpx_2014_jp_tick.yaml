# Natural Experiment Record #4: JPX Tick Size Reduction (2014)
#
# Japan Exchange Group (JPX / Tokyo Stock Exchange) reduced tick sizes for
# TOPIX 100 constituent stocks on 2014-01-14, as part of the Arrowhead
# trading system upgrade.  For stocks priced above JPY 3,000, the minimum
# tick was reduced from JPY 1 to JPY 0.1 (a 10x reduction).  For stocks
# in the JPY 1,000-3,000 range, tick was halved from JPY 1 to JPY 0.5.
#
# The treatment group consists of TOPIX 100 stocks; non-TOPIX 100 stocks
# (which retained their original tick sizes) serve as a control group.
#
# This is a tick_size_decrease intervention — the opposite direction of
# the TSPP and MiFID II tick increases.  Theoretically, finer ticks should
# narrow spreads, improve price discovery, but may increase quote
# flickering and reduce displayed depth.
#
# Ground truth deltas RE-DERIVED from raw daily returns using PRISM's
# own fact estimators (v0.2.0) via Difference-in-Differences:
#   Treatment: 15 TOPIX 100 large-cap stocks (yfinance)
#   Control:   10 non-TOPIX-100 TSE stocks (yfinance)
#   Pre:  2013-07-19 to 2014-01-13 (117 trading days)
#   Post: 2014-01-14 to 2014-07-14 (123 trading days)
#   Bootstrap CI95 with 2000 resamples on stock-level estimates.
#
# NOTE: Prior external_claim values from Comerton-Forde et al. and
# Yao & Ye measured spread/liquidity/price-efficiency — different
# quantities from PRISM's return-distribution facts.  Those values
# have been replaced by this empirical re-derivation.

ner_id: "jpx_2014_jp_tick"

intervention:
  class: "tick_size_decrease"
  canonical_params:
    min_tick_from: 1.0
    min_tick_to: 0.1
    unit: "JPY"
    scope: "topix100_largecap"

venue: "JP_equity_largecap"
date_effective: "2014-01-14"
assignment: "regulatory_cutoff"

ground_truth_delta:
  - fact_id: "volatility_clustering"
    delta_hat: -0.073
    ci95: [-0.299, 0.145]
    causal_method: "did_firm_fe"
    causal_assumptions:
      - "parallel_trends"
      - "no_anticipation"
      - "no_spillover_to_non_topix100"
    unit: "relative"
    references:
      - "empirical_prism_estimator_v0.2.0"
      - "yfinance_topix100_2013-2014"

  - fact_id: "leverage_effect"

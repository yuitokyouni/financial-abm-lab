# Natural Experiment Record #4: JPX Tick Size Reduction (2014)
#
# Japan Exchange Group (JPX / Tokyo Stock Exchange) reduced tick sizes for
# TOPIX 100 constituent stocks on 2014-01-14, as part of the Arrowhead
# trading system upgrade.  For stocks priced above JPY 3,000, the minimum
# tick was reduced from JPY 1 to JPY 0.1 (a 10x reduction).  For stocks
# in the JPY 1,000-3,000 range, tick was halved from JPY 1 to JPY 0.5.
#
# The treatment group consists of TOPIX 100 stocks; non-TOPIX 100 stocks
# (which retained their original tick sizes) serve as a control group.
#
# This is a tick_size_decrease intervention — the opposite direction of
# the TSPP and MiFID II tick increases.  Theoretically, finer ticks should
# narrow spreads, improve price discovery, but may increase quote
# flickering and reduce displayed depth.
#
# Ground truth deltas from Comerton-Forde, Putniņš & Tang (2022),
# Yao & Ye (2018), and the JPX Working Papers series.
# Tagged as "external_claim" until re-derived from raw data within PRISM.

ner_id: "jpx_2014_jp_tick"

intervention:
  class: "tick_size_decrease"
  canonical_params:
    min_tick_from: 1.0
    min_tick_to: 0.1
    unit: "JPY"
    scope: "topix100_largecap"

venue: "JP_equity_largecap"
date_effective: "2014-01-14"
assignment: "regulatory_cutoff"


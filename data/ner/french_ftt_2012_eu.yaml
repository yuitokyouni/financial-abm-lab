      - "no_spillover"
    unit: "relative"
    references:
      - "Capelle-Blancard & Havrylchyk 2016"
      - "external_claim"

  - fact_id: "fat_tails"
    delta_hat: 0.3
    ci95: [-0.3, 0.9]
    causal_method: "did_firm_fe"
    causal_assumptions:

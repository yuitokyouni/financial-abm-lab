[project]
name = "stylized-facts"
version = "0.1.0"
description = "Cont (2001) stylized facts 計算 (統一実装)"
requires-python = ">=3.11"
dependencies = ["numpy"]

[project.optional-dependencies]
viz = ["matplotlib"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["stylized_facts"]

[project]
name = "atlas"
version = "0.1.0"
description = "Intervention Atlas — model contract v1, scoring profiles, reference-atlas generation (spec 002 MVA)"
requires-python = ">=3.11"
dependencies = ["numpy", "scipy", "abm-models", "stylized-facts", "provenance"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["atlas"]

[tool.uv.sources]
abm-models = { workspace = true }
stylized-facts = { workspace = true }
provenance = { workspace = true }

[project]
name = "fingerprint-atlas"
version = "0.1.0"
description = "Stylized-facts fingerprint space — ABM atlas / novelty / inverse-ABM as nearest-neighbour queries."
requires-python = ">=3.11"
dependencies = ["numpy", "abm-models", "stylized-facts", "groq", "openai", "arxiv", "pypdf"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["fingerprint_atlas"]
